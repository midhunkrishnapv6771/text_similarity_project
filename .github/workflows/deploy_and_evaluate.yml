name: GitHub Actions CI/CD & Render Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Daily midnight UTC run
  workflow_dispatch:
    inputs:
      custom_sentence_a:
        description: 'Temporary Sentence A (Leave blank for full dataset benchmark)'
        required: false
        default: ''
      custom_sentence_b:
        description: 'Temporary Sentence B (Leave blank for full dataset benchmark)'
        required: false
        default: ''
      sample_count:
        description: 'Number of sample dataset cases to evaluate (if not testing custom pair)'
        required: false
        default: '50'

# Smart Concurrency: Cancels stale intermediate pushes, saving GitHub free runner minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-and-test:
    name: Run PyTorch STS Evaluation (7GB RAM Runner)
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Hard 10-min safety timeout (prevents hangs & saves minutes)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache HuggingFace Transformer Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Evaluate Custom Pair or Dataset Benchmark
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENTENCE_A: ${{ github.event.inputs.custom_sentence_a }}
          SENTENCE_B: ${{ github.event.inputs.custom_sentence_b }}
          SAMPLE_SIZE: ${{ github.event.inputs.sample_count || '50' }}
        run: |
          if [ -n "$SENTENCE_A" ] && [ -n "$SENTENCE_B" ]; then
            echo "[+] Running PyTorch Local Model Single Pair Test on 7GB RAM GitHub Runner..."
            python semantic_local.py --text1 "$SENTENCE_A" --text2 "$SENTENCE_B"
          else
            echo "[+] Executing evaluation benchmark with $SAMPLE_SIZE test samples..."
            python evaluator.py --sample $SAMPLE_SIZE
          fi

      - name: Upload Results Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sts-evaluation-report
          path: |
            results_comparison.csv
            comparison_report.md
          retention-days: 7  # Auto-cleans old artifacts to save GitHub storage

  deploy-to-render:
    name: Trigger Render Deployment
    needs: benchmark-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Quick 5-min timeout for webhook call
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "[+] Triggering Render Deploy Hook..."
            curl -sS -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "[!] RENDER_DEPLOY_HOOK_URL secret not set. Skipping Render deploy."
          fi
