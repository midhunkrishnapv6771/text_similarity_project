name: GitHub Actions CI/CD & Render Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark-and-test:
    name: Run PyTorch STS Evaluation (7GB RAM Runner)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Benchmark Evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python evaluator.py --sample 50

      - name: Upload Results Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sts-evaluation-report
          path: |
            results_comparison.csv
            comparison_report.md

  deploy-to-render:
    name: Trigger Render Deployment
    needs: benchmark-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "[+] Triggering Render Deploy Hook..."
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "[!] RENDER_DEPLOY_HOOK_URL secret not set. Skipping automatic Render deploy trigger."
          fi
